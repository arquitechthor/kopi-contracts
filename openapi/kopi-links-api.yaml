openapi: 3.0.3
info:
  title: Kopi Links & Tasks API
  description: Links and Tasks manager for Kopi Tools. All endpoints require JWT authentication.
  version: 1.0.0
  contact:
    name: Arquitechthor
    url: https://github.com/arquitechthor

servers:
  - url: http://localhost:8080
    description: Local via Gateway
  - url: http://localhost:8082
    description: Direct (local dev)

security:
  - bearerAuth: []

tags:
  - name: links
    description: Link management
  - name: tasks
    description: Task management

paths:
  /api/links:
    get:
      tags: [links]
      summary: Get all links for the current user
      operationId: getAllLinks
      responses:
        '200':
          description: List of links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LinkResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags: [links]
      summary: Create a new link
      operationId: createLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkRequest'
            example:
              url: "https://spring.io"
              title: "Spring Framework"
              description: "Official Spring documentation"
              category: "Dev Tools"
              tags: "java,spring,backend"
      responses:
        '201':
          description: Link created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/links/grouped:
    get:
      tags: [links]
      summary: Get links grouped by category
      operationId: getLinksGrouped
      responses:
        '200':
          description: Links grouped by category
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    $ref: '#/components/schemas/LinkResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/links/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64

    get:
      tags: [links]
      summary: Get a link by ID
      operationId: getLinkById
      responses:
        '200':
          description: Link found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    put:
      tags: [links]
      summary: Update a link
      operationId: updateLink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkRequest'
      responses:
        '200':
          description: Link updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LinkResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
      tags: [links]
      summary: Delete a link
      operationId: deleteLink
      responses:
        '204':
          description: Link deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/tasks:
    get:
      tags: [tasks]
      summary: Get all tasks for the current user (ordered by priority)
      operationId: getAllTasks
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

    post:
      tags: [tasks]
      summary: Create a new task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRequest'
            example:
              title: "Review PR #42"
              description: "Review and merge the authentication PR"
              category: "Work"
              tags: "review,code"
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/tasks/grouped:
    get:
      tags: [tasks]
      summary: Get tasks grouped by category
      operationId: getTasksGrouped
      responses:
        '200':
          description: Tasks grouped by category
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: array
                  items:
                    $ref: '#/components/schemas/TaskResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64

    get:
      tags: [tasks]
      summary: Get a task by ID
      operationId: getTaskById
      responses:
        '200':
          description: Task found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    put:
      tags: [tasks]
      summary: Update a task
      operationId: updateTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

    delete:
      tags: [tasks]
      summary: Delete a task
      operationId: deleteTask
      responses:
        '204':
          description: Task deleted
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

  /api/tasks/{id}/move/{direction}:
    patch:
      tags: [tasks]
      summary: Move a task up or down in priority
      operationId: moveTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: direction
          in: path
          required: true
          schema:
            type: string
            enum: [up, down]
      responses:
        '204':
          description: Task moved
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LinkRequest:
      type: object
      required: [url, title, category]
      properties:
        url:
          type: string
          format: uri
        title:
          type: string
          minLength: 1
        description:
          type: string
        category:
          type: string
          minLength: 1
        tags:
          type: string
          description: Comma-separated tags

    LinkResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        url:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
        tags:
          type: string

    TaskRequest:
      type: object
      required: [title, description, category]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
        tags:
          type: string
        priority:
          type: integer
          description: Manual priority override (auto-assigned if omitted)

    TaskResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        category:
          type: string
        tags:
          type: string
        priority:
          type: integer

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    UnauthorizedError:
      description: Authentication required
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    NotFoundError:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
